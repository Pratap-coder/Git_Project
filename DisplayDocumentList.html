<!-- 
%%[
VAR @docs, @rowset, @rowCount, @i, @row, @value
VAR @uniqueList
/* Input string */
SET @docs = AttributeValue("Documents") /* e.g. "doc1-doc2-doc1-doc3" */
/* Split into rows */
SET @rowset = BuildRowsetFromString(@docs, "-")
SET @rowCount = RowCount(@rowset)
/* Initialize result */
SET @uniqueList = ""
/* Loop through values */
FOR @i = 1 TO @rowCount DO
   SET @row = Row(@rowset, @i)
   SET @value = Trim(Field(@row, 1))
   /* Check if already exists in result */
   IF IndexOf(Concat(";", @uniqueList, ";"), Concat(";", @value, ";")) == 0 THEN
       /* Add to result */
       IF Empty(@uniqueList) THEN
           SET @uniqueList = @value
       ELSE
           SET @uniqueList = Concat(@uniqueList, ";", @value)
       ENDIF
   ENDIF
NEXT @i
]%% 
-->
%%=v(@uniqueList)=%%

<!--
%%[
    var @documents ,@rows, @rowCount, @i, @item, @uniqueTracker, @finalOutput
    Set @documents = LookupRows("SIREN_Alerts_Uni_Documents","SIREN",SIREN)
    set @rows = BuildRowsetFromString(@documents, "-")
    set @rowCount = RowCount(@rows)
    set @uniqueTracker = "|" 
    set @finalOutput = ""
    for @i = 1 to @rowCount do
        set @item = Field(Row(@rows, @i), 1)
        set @item = Trim(@item) 
        if not empty(@item) then
            var @checkItem
            set @checkItem = concat("|", @item, "|")
            if IndexOf(@uniqueTracker, @checkItem) == 0 then
                set @uniqueTracker = Concat(@uniqueTracker, @item, "|")
                set @finalOutput = Concat(@finalOutput, "- ", @item, "<br>")   
            endif 
        endif 
    next @i
]%% -->
