<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><Button></button></title>
    <style>
        .subscribe-button {
            background-color: rgb(198, 0, 0);
            color: white;
            border: none;
            height: 36px;
            width: 105px;
            border-radius: 2px;
            cursor: pointer;
            margin: 8px;
            transition: opacity 0.15s;
        }
        .subscribe-button:hover {
            background-color: rgb(141, 32, 76);
            opacity: 0.8;
        }
        .subscribe-button:active {
            background-color: green;
        }
        .join-button:hover {
            background-color: rgb(41, 118, 211);
            color: white;
            opacity: 0.8;
        }
        .join-button {
            background-color: white;
            color: rgb(41, 118, 211);
            border: 1px solid rgb(41, 118, 211);
            height: 36px;
            width: 62px;
            border-radius: 2px;
            cursor: pointer;
            margin: 8px;
        }
        .tweet-button {
            background-color: rgb(2, 158, 255);
            color: white;
            border: none;
            height: 36px;
            width: 74px;
            font-weight: bold;
            border-radius: 18px;
            cursor: pointer;
        }
    </style>

</head>
<body>
    <button class="subscribe-button">SUBSCRIBE</button>
    <button class="join-button">JOIN</button>
    <button class="tweet-button">Tweet</button>


</body>
</html>
